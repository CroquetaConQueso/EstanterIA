spring.datasource.url=jdbc:postgresql://localhost:5432/estanteria
spring.datasource.username=estanteria_user
spring.datasource.password=estanteria_password

vision.api.base-url=http://127.0.0.1:8001
vision.provider=http
alertas.revision-manual.umbral-confianza=0.70
alertas.caducidad.dias-umbral=7
security.jwt.secret=${JWT_SECRET:estanteria-desarrollo-cambiar-en-produccion-2026}
security.jwt.expiration-minutes=60
security.jwt.issuer=estanteria-api

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.auth.recovery.from=${MAIL_USERNAME:}
app.frontend.base-url=http://localhost:5173

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
