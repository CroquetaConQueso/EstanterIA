spring.datasource.url=jdbc:h2:mem:estanteria_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;INIT=CREATE DOMAIN IF NOT EXISTS user_role AS VARCHAR(20)
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Evitar uso de Vision HTTP real en tests
vision.provider=simulado

# Configuracion JWT valida para test
security.jwt.secret=estanteria-test-secret-muy-largo-para-hmac-2026
security.jwt.expiration-minutes=60
security.jwt.issuer=estanteria-api-test

# Evitar dependencia de SMTP real
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=
spring.mail.password=

app.auth.recovery.from=
app.frontend.base-url=http://localhost:5173

# Evitar datos demo de autenticacion en la base efimera de tests
app.auth.seed.enabled=false
