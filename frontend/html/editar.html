<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Redirigiendo al editor · Suite Tienda</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="refresh" content="0; url=editor.html" />
</head>
<body>
<p>Redirigiendo al editor de planos persistente...</p>
<script>
  const params = new URLSearchParams(window.location.search);
  const codigo = params.get("codigo");
  window.location.replace(codigo ? `editor.html?codigo=${encodeURIComponent(codigo)}` : "editor.html");
</script>
</body>
</html>
