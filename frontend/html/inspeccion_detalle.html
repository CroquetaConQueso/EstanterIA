<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Detalle de inspección · EstanterIA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="../img/iconoFAV.png" />
  <link href="../css/inspeccion_detalle.css" rel="stylesheet" />
</head>
<body>
<header class="topbar" data-app-header></header>

<main class="page">
  <header class="page-head">
    <div>
      <h1>Detalle completo de la inspección</h1>
      <p>Vista completa de una inspección concreta, sin inflar el listado general.</p>
    </div>

    <div class="filters-inline">
      <a class="btn ghost" id="btn-volver-listado" href="inspecciones.html">Volver al listado</a>
      <a class="btn ghost" id="btn-editar-inspeccion" href="#">Editar</a>
      <a class="btn ghost" id="btn-abrir-imagen-detalle" href="#" target="_blank" rel="noopener noreferrer">Abrir imagen</a>
      <button class="btn primary" id="btn-eliminar-inspeccion" type="button">Eliminar</button>
    </div>
  </header>

  <p class="form-error" id="detalle-page-error" role="alert" aria-live="polite" hidden></p>
  <p class="help" id="detalle-page-success" hidden></p>

  <section class="detail-layout">
    <section class="detail-main">
      <div class="photo-placeholder" id="detalle-photo-placeholder">
        <span>Cargando imagen...</span>
      </div>
    </section>

    <aside class="detail-side">
      <div class="detail-block">
        <h3>Resumen</h3>
        <ul id="detalle-resumen-completo"></ul>
      </div>

      <div class="detail-block">
        <h3>Resumen IA</h3>
        <ul id="detalle-summary-completo"></ul>
      </div>

      <div class="detail-block">
        <h3>Productos OK</h3>
        <ul id="detalle-ok-completo"></ul>
      </div>

      <div class="detail-block">
        <h3>Huecos detectados</h3>
        <ul id="detalle-gaps-completo"></ul>
      </div>
    </aside>
  </section>
</main>

<footer class="foot">
  <small>EstanterIA · Detalle de inspección</small>
</footer>

<script src="../js/header.js"></script>
<script type="module" src="/src/pages/inspeccion_detalle.ts"></script>
</body>
</html>
