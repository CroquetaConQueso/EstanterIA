<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Registro · EstanterIA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="../img/iconoFAV.png" />
    <link href="../css/registro.css" rel="stylesheet" />
  </head>
  <body>
    <header class="topbar home-topbar" data-app-header></header>

    <main class="page">
      <section class="shell">
        <div class="intro">
          <h1>Crear cuenta</h1>
          <p>
            Completa los datos para registrar una cuenta nueva en EstanterIA.
          </p>
          <ol class="steps">
            <li>Define tu nombre de usuario y correo.</li>
            <li>Selecciona un rol inicial.</li>
            <li>Establece tu contraseña y accede al sistema.</li>
          </ol>
        </div>

        <form class="card registro-form" id="form-registro">
          <h2>Datos de acceso</h2>

          <label>
            Nombre de usuario
            <input type="text" id="reg-nombre" name="username" required />
          </label>

          <label>
            Correo electrónico
            <input type="email" id="reg-email" name="email" required />
          </label>

          <label>
            Rol previsto
            <select id="reg-rol" name="rol">
              <option value="WORKER" selected>Reposición</option>
              <option value="SECTION_MANAGER">Encargado/a de sección</option>
              <option value="STORE_MANAGER">Jefe/a de tienda</option>
              <option value="REGIONAL_MANAGER">Dirección regional</option>
            </select>
          </label>

          <label>
            Tienda principal
            <input
              type="text"
              id="reg-tienda"
              name="tienda"
              placeholder="Ej: Supermercado Centro"
            />
          </label>

          <label>
            Contraseña
            <input type="password" id="reg-pass" name="password" required />
          </label>

          <label>
            Repetir contraseña
            <input type="password" id="reg-pass2" name="password2" required />
          </label>

          <label class="terms">
            <input type="checkbox" id="reg-terms" required />
            <span>Acepto las condiciones de uso.</span>
          </label>

          <p
            class="form-error"
            id="reg-error"
            role="alert"
            aria-live="polite"
            hidden
          ></p>
          <p
            class="form-success"
            id="reg-success"
            role="status"
            aria-live="polite"
            hidden
          ></p>

          <button class="btn primary" type="submit">Crear cuenta</button>

          <p class="small">
            ¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a>
          </p>
        </form>
      </section>
    </main>

    <footer class="foot">
      <small>EstanterIA · Registro</small>
    </footer>

    <script src="../js/header.js"></script>
    <script type="module" src="/src/pages/registro.ts"></script>
  </body>
</html>
