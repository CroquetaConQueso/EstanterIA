<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Restablecer contraseña · EstanterIA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="../img/iconoFAV.png" />
  <link href="../css/reset_password.css" rel="stylesheet" />
</head>
<body>
<header class="topbar" data-app-header></header>

<main class="page">
  <section class="card">
    <h1>Restablecer contraseña</h1>
    <p class="help">
      Introduce una nueva contraseña para tu cuenta. Este enlace solo puede usarse una vez.
    </p>

    <p class="form-error" id="reset-error" hidden></p>
    <p class="form-success" id="reset-success" hidden></p>
    <p class="help" id="reset-status">Validando enlace...</p>

    <form id="form-reset-password">
      <label>
        Nueva contraseña
        <input type="password" id="reset-new-password" required />
      </label>

      <label>
        Confirmar nueva contraseña
        <input type="password" id="reset-confirm-password" required />
      </label>

      <div class="actions">
        <button class="btn primary" type="submit" id="btn-reset-password" disabled>
          Guardar nueva contraseña
        </button>

        <a class="btn ghost" href="login.html">
          Volver al acceso
        </a>
      </div>
    </form>
  </section>
</main>

<footer class="foot">
  <small>EstanterIA · Restablecimiento de contraseña</small>
</footer>

<script src="../js/header.js"></script>
<script type="module" src="/src/pages/reset_password.ts"></script>
</body>
</html>
